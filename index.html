<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Menú</title>
<style>
  :root{
    --bg:#F2F2F7;--card:#FFFFFF;--ink:#1C1C1E;--ink2:#3C3C43;--muted:#8E8E93;
    --sep:#E5E5EA;--fill:#E9E9EB;--green:#34C759;--blue:#0A84FF;--red:#FF3B30;
    --orange:#FF9500;--pink:#FF2D55;--purple:#AF52DE;--teal:#30B0C7;
    --sans:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.45;padding-bottom:96px;letter-spacing:-.01em}
  .wrap{max-width:500px;margin:0 auto;padding:0 16px}
  header{padding:14px 16px 6px;max-width:500px;margin:0 auto}
  .h-sub{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:1px}
  h1{font-size:34px;font-weight:700;letter-spacing:-.02em}

  /* Date navigator */
  .datenav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:14px;padding:8px 10px;margin-top:14px}
  .datenav button{border:none;background:var(--fill);width:36px;height:36px;border-radius:10px;font-size:18px;color:var(--blue);cursor:pointer;flex:0 0 auto}
  .datenav button:active{opacity:.6}
  .datenav button:disabled{opacity:.3;cursor:default}
  .date-center{text-align:center;flex:1;cursor:pointer}
  .date-day{font-size:16px;font-weight:700}
  .date-full{font-size:12px;color:var(--muted);font-weight:500}
  .today-pill{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:var(--blue);border-radius:10px;padding:1px 7px;margin-left:6px;vertical-align:1px;letter-spacing:.02em}

  .dash{background:var(--card);border-radius:18px;padding:18px 18px 4px;margin:10px 0 16px}
  .dash-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .dash-title{font-size:17px;font-weight:600}
  .dash-status{font-size:13px;font-weight:600;padding:5px 11px;border-radius:20px}
  .st-zero{background:var(--fill);color:var(--muted)}
  .st-under{background:rgba(52,199,89,.15);color:#248A3D}
  .st-hit{background:var(--green);color:#fff}
  .st-over{background:rgba(255,59,48,.15);color:var(--red)}
  .bigmetric{margin-bottom:17px}
  .bm-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .bm-name{font-size:14px;font-weight:600}
  .bm-val{font-size:14px;color:var(--muted);font-weight:500}
  .bm-val b{font-size:18px;color:var(--ink);font-weight:700;letter-spacing:-.02em}
  .bigbar{height:14px;background:var(--fill);border-radius:7px;overflow:hidden}
  .bigbar-fill{height:100%;border-radius:7px;transition:width .5s cubic-bezier(.34,1.3,.5,1)}

  .meal{background:var(--card);border-radius:18px;margin-bottom:16px;overflow:hidden}
  .meal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px}
  .meal-name{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .meal-time{font-size:12px;color:var(--muted);font-weight:500;margin-left:7px}
  .meal-kcal{font-size:13px;color:var(--muted);font-weight:600}
  .meal-kcal b{color:var(--ink)}
  .guide-tag{font-size:11px;color:var(--muted);font-weight:600;padding:0 16px 8px}
  .item{display:flex;align-items:center;gap:12px;padding:11px 16px;position:relative}
  .item:not(:last-of-type)::after{content:"";position:absolute;left:50px;right:0;bottom:0;height:.5px;background:var(--sep)}
  .item.off{opacity:.5}
  .chk{flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:2px solid #C7C7CC;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
  .chk.on{background:var(--green);border-color:var(--green)}
  .chk.on::after{content:"✓";color:#fff;font-size:15px;font-weight:700}
  .item-body{flex:1;min-width:0}
  .item-name{font-size:15px;font-weight:500}
  .item-sub{font-size:12px;color:var(--muted);margin-top:1px}
  .item-act{flex:0 0 auto}
  .mini{border:none;background:transparent;color:#C7C7CC;width:28px;height:28px;font-size:22px;cursor:pointer;line-height:1}
  .mini:active{color:var(--red)}
  .add-row{padding:8px 16px 14px}
  .add-btn{width:100%;border:none;background:rgba(10,132,255,.1);color:var(--blue);padding:11px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}
  .add-btn:active{background:rgba(10,132,255,.2)}
  .reset{display:block;margin:2px auto 8px;background:none;border:none;color:var(--blue);font-size:14px;font-weight:500;cursor:pointer}

  .free-card{background:var(--card);border-radius:18px;padding:36px 20px;text-align:center}
  .free-card .big{font-size:44px;margin-bottom:10px}
  .free-card h2{font-size:22px;font-weight:700;margin-bottom:5px}
  .free-card p{font-size:14px;color:var(--muted)}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:.25s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--bg);border-radius:14px 14px 0 0;max-width:500px;margin:0 auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:90vh;display:flex;flex-direction:column}
  .sheet.show{transform:translateY(0)}
  .sheet-grip{width:36px;height:5px;background:#C7C7CC;border-radius:3px;margin:8px auto 2px}
  .sheet-head{padding:8px 18px 10px}
  .sheet-head h3{font-size:22px;font-weight:700;letter-spacing:-.02em}
  .sheet-head p{font-size:13px;color:var(--muted);margin-top:1px;font-weight:500}
  .seg{display:flex;gap:2px;margin:4px 18px 0;background:var(--fill);border-radius:10px;padding:2px}
  .seg-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:8px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;transition:.12s}
  .seg-btn.active{background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .sheet-body{padding:16px 18px 22px;overflow-y:auto;flex:1}
  .search{width:100%;padding:12px 14px;border:none;border-radius:12px;font-size:16px;background:var(--card);font-family:var(--sans)}
  .search:focus{outline:none}
  .list-group{background:var(--card);border-radius:14px;overflow:hidden;margin-top:12px}
  .staple{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;position:relative}
  .staple:not(:last-child)::after{content:"";position:absolute;left:14px;right:0;bottom:0;height:.5px;background:var(--sep)}
  .staple:active{background:var(--fill)}
  .staple-name{font-size:15px;font-weight:500}
  .staple-macros{font-size:12px;color:var(--muted);margin-top:1px}
  .staple-add{font-size:24px;color:var(--blue);font-weight:300}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:6px;padding-left:2px}
  .field input{width:100%;padding:12px 14px;border:none;border-radius:12px;font-size:16px;background:var(--card);font-family:var(--sans)}
  .field input:focus{outline:none}
  .grid4{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .save-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:6px}
  .save-btn:active{opacity:.85}
  .hint{font-size:12px;color:var(--muted);margin-top:10px;text-align:center}
  .ai-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer}
  .ai-btn:disabled{opacity:.5}
  .ai-found{background:var(--card);border-radius:14px;padding:15px;margin-top:14px}
  .ai-found .fn{font-size:15px;font-weight:600;margin-bottom:2px}
  .ai-found .fm{font-size:13px;color:var(--muted)}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .fab{position:fixed;bottom:22px;right:max(20px,calc(50% - 250px + 18px));z-index:45;width:56px;height:56px;border-radius:50%;background:var(--blue);color:#fff;border:none;box-shadow:0 4px 16px rgba(10,132,255,.4);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .fab:active{transform:scale(.94)}
  .chat{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--bg);border-radius:14px 14px 0 0;max-width:500px;margin:0 auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);height:84vh;display:flex;flex-direction:column}
  .chat.show{transform:translateY(0)}
  .chat-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:14px 14px 0 0;border-bottom:.5px solid var(--sep)}
  .chat-head h3{font-size:17px;font-weight:700}
  .chat-head .x{background:var(--fill);border:none;width:30px;height:30px;border-radius:50%;font-size:16px;color:var(--muted);cursor:pointer}
  .chat-log{flex:1;overflow-y:auto;padding:16px 14px 8px;display:flex;flex-direction:column;gap:8px}
  .bub{max-width:78%;padding:9px 14px;border-radius:20px;font-size:15px;line-height:1.4;white-space:pre-wrap;word-wrap:break-word}
  .bub.me{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:6px}
  .bub.ai{align-self:flex-start;background:var(--card);color:var(--ink);border-bottom-left-radius:6px}
  .bub.sys{align-self:center;background:rgba(52,199,89,.15);color:#248A3D;font-size:13px;font-weight:600;padding:6px 13px;border-radius:20px;max-width:90%}
  .chips{display:flex;gap:7px;padding:0 14px 8px;flex-wrap:wrap}
  .chip{font-size:13px;border:none;background:var(--card);color:var(--blue);padding:8px 13px;border-radius:18px;cursor:pointer;font-weight:500}
  .chip:active{background:var(--fill)}
  .chat-in{display:flex;gap:9px;padding:10px 14px;background:var(--card);border-top:.5px solid var(--sep)}
  .chat-in input{flex:1;padding:11px 16px;border:.5px solid var(--sep);border-radius:22px;font-size:16px;background:var(--bg);font-family:var(--sans)}
  .chat-in input:focus{outline:none;border-color:var(--blue)}
  .chat-in button{border:none;background:var(--blue);color:#fff;width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer;flex:0 0 auto}
  .chat-in button:disabled{opacity:.4}

  /* Tab bar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(249,249,249,.92);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:.5px solid var(--sep);display:flex;max-width:500px;margin:0 auto;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
  .tabbar button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;cursor:pointer;color:var(--muted)}
  .tabbar button.active{color:var(--blue)}
  .tabbar .tb-ic{font-size:22px;line-height:1}
  .tabbar .tb-lb{font-size:10px;font-weight:600;letter-spacing:.01em}
  .view{display:none}
  .view.active{display:block}

  /* Shopping / Notes */
  .sec-head{padding:16px 16px 6px;max-width:500px;margin:0 auto}
  .sec-head h1{font-size:34px;font-weight:700;letter-spacing:-.02em}
  .gen-btn{width:100%;border:none;background:var(--blue);color:#fff;padding:13px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin:6px 0 12px}
  .gen-btn:active{opacity:.85}
  .add-inline{display:flex;gap:8px;margin-bottom:14px}
  .add-inline input{flex:1;padding:12px 14px;border:none;border-radius:12px;font-size:16px;background:var(--card);font-family:var(--sans)}
  .add-inline input:focus{outline:none}
  .add-inline button{border:none;background:var(--green);color:#fff;width:46px;border-radius:12px;font-size:22px;cursor:pointer}
  .shop-group{background:var(--card);border-radius:16px;overflow:hidden;margin-bottom:14px}
  .shop-cat{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:12px 16px 6px}
  .shop-item{display:flex;align-items:center;gap:12px;padding:11px 16px;position:relative;cursor:pointer}
  .shop-item:not(:last-child)::after{content:"";position:absolute;left:50px;right:0;bottom:0;height:.5px;background:var(--sep)}
  .shop-item.done .shop-name{text-decoration:line-through;color:var(--muted)}
  .shop-chk{flex:0 0 auto;width:24px;height:24px;border-radius:50%;border:2px solid #C7C7CC;display:flex;align-items:center;justify-content:center;transition:.12s}
  .shop-chk.on{background:var(--green);border-color:var(--green)}
  .shop-chk.on::after{content:"✓";color:#fff;font-size:14px;font-weight:700}
  .shop-name{flex:1;font-size:15px}
  .shop-del{border:none;background:transparent;color:#C7C7CC;width:28px;height:28px;font-size:20px;cursor:pointer}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 20px}
  .notes-area{width:100%;min-height:340px;border:none;border-radius:16px;background:var(--card);padding:16px;font-size:16px;font-family:var(--sans);line-height:1.5;resize:vertical}
  .notes-area:focus{outline:none}
  .saved-tag{font-size:12px;color:var(--green);font-weight:600;text-align:center;margin-top:8px;opacity:0;transition:.2s}
  .saved-tag.show{opacity:1}
</style>
</head>
<body>
<!-- ===== MENU VIEW ===== -->
<div class="view active" id="view-menu">
<header>
  <div class="h-sub">Recomposición · Ayuno 16/8 · 12:00–20:00</div>
  <h1>Mi menú</h1>
  <div class="datenav">
    <button id="prevDay">‹</button>
    <div class="date-center" id="dateCenter">
      <div class="date-day" id="dateDay">—</div>
      <div class="date-full" id="dateFull">—</div>
    </div>
    <button id="nextDay">›</button>
  </div>
</header>
<div class="wrap">
  <div class="dash" id="dash"><div class="dash-top"><span class="dash-title">Resumen del día</span><span class="dash-status" id="status">—</span></div><div id="metrics"></div></div>
  <div id="meals"></div>
  <button class="reset" id="resetBtn">Vaciar lo registrado de este día</button>
</div>
</div>

<!-- ===== SHOPPING VIEW ===== -->
<div class="view" id="view-shop">
<div class="sec-head"><h1>Compras</h1></div>
<div class="wrap">
  <button class="gen-btn" id="genShop">↻ Generar desde el menú de la semana</button>
  <div class="add-inline">
    <input id="shopInp" placeholder="Agregar a mano…">
    <button id="shopAdd">+</button>
  </div>
  <div id="shopList"></div>
</div>
</div>

<!-- ===== NOTES VIEW ===== -->
<div class="view" id="view-notes">
<div class="sec-head"><h1>Notas</h1></div>
<div class="wrap">
  <textarea class="notes-area" id="notesArea" placeholder="Escribí lo que quieras: ideas de comidas, recordatorios, lo que te cayó pesado, lo que querés agregar al plan…"></textarea>
  <div class="saved-tag" id="savedTag">Guardado ✓</div>
</div>
</div>

<button class="fab" id="fab">💬</button>

<!-- ===== TAB BAR ===== -->
<nav class="tabbar">
  <button class="active" data-view="menu"><span class="tb-ic">🍽️</span><span class="tb-lb">Menú</span></button>
  <button data-view="shop"><span class="tb-ic">🛒</span><span class="tb-lb">Compras</span></button>
  <button data-view="notes"><span class="tb-ic">📝</span><span class="tb-lb">Notas</span></button>
</nav>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="sheet-grip"></div>
  <div class="sheet-head"><h3 id="sheetTitle">Añadir alimento</h3><p id="sheetSub"></p></div>
  <div class="seg">
    <button class="seg-btn active" id="tabAI">Escribir · yo calculo</button>
    <button class="seg-btn" id="tabStaple">Mis básicos</button>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>
<div class="scrim" id="chatScrim"></div>
<div class="chat" id="chat">
  <div class="chat-head"><h3>Coach</h3><button class="x" id="chatX">✕</button></div>
  <div class="chat-log" id="chatLog"></div>
  <div class="chips" id="chips"></div>
  <div class="chat-in"><input id="chatInp" placeholder="Decime qué comiste o preguntame…"><button id="chatSend">↑</button></div>
</div>

const DAY_FULL=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

/* ---------- DATE ---------- */
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
const today=new Date();today.setHours(0,0,0,0);
let viewDate=new Date(today);
function isToday(d){return ymd(d)===ymd(today)}

/* ---------- STORAGE ---------- */
const STORE_KEY="mayte_menu_v5";
function loadAll(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{}}catch(e){return {}}}
function saveAll(o){try{localStorage.setItem(STORE_KEY,JSON.stringify(o))}catch(e){}}
let allData=loadAll(); // { "2026-06-15": {Comida:[...], Snack:[...], Cena:[...]} }

/* Build a fresh ZERO-state day for a given date: menu items present but on=false.
   If a custom log already exists for that date, use it. */
function dayState(date){
  const key=ymd(date);
  if(allData[key])return allData[key];
  const wd=date.getDay();
  if(BASE[wd]==="free")return "free";
  const o={};
  for(const meal of ["Comida","Snack","Cena"]){
    o[meal]=BASE[wd][meal].map((it,i)=>({...it,on:false,id:meal+i+"_"+Math.random().toString(36).slice(2,6)}));
  }
  return o;
}
function persist(date,st){
  if(st==="free")return;
  allData[ymd(date)]=st;saveAll(allData);
}

let state=dayState(viewDate);

/* ---------- RENDER ---------- */
function renderDate(){
  const wd=viewDate.getDay();
  $("dateDay").innerHTML=DAY_FULL[wd]+(isToday(viewDate)?'<span class="today-pill">HOY</span>':'');
  $("dateFull").textContent=viewDate.getDate()+" de "+MONTHS[viewDate.getMonth()]+" "+viewDate.getFullYear();
  // se puede navegar a días futuros para planificar
  $("nextDay").disabled=false;
}
function totals(){
  const t={kcal:0,protein:0,carbs:0,fat:0,fiber:0};
  if(state==="free")return t;
  for(const meal of ["Comida","Snack","Cena"])state[meal].forEach(it=>{if(it.on){t.kcal+=it.kcal;t.protein+=it.p;t.carbs+=it.c;t.fat+=it.f;t.fiber+=it.fib}});
  Object.keys(t).forEach(k=>t[k]=Math.round(t[k]));return t;
}
function anyChecked(){
  if(state==="free")return false;
  return ["Comida","Snack","Cena"].some(m=>state[m].some(it=>it.on));
}
function bigBar(name,val,goal,type,unit,color){
  const pct=Math.min(100,Math.round(val/goal*100));
  let c=color;
  if(type==='ceiling'&&val>goal)c='var(--red)';
  if(type==='floor'&&val>=goal)c='var(--green)';
  return `<div class="bigmetric"><div class="bm-head"><span class="bm-name">${name}</span><span class="bm-val"><b>${val}</b> / ${goal}${unit}</span></div><div class="bigbar"><div class="bigbar-fill" style="width:${pct}%;background:${c}"></div></div></div>`;
}
function renderDash(){
  if(state==="free"){$("dash").style.display="none";return}
  $("dash").style.display="block";
  const t=totals();
  let stClass,stText;
  if(!anyChecked()){stClass="st-zero";stText="Sin registrar"}
  else{
    const protOk=t.protein>=GOAL.protein,kcalOver=t.kcal>GOAL.kcal;
    if(kcalOver){stClass="st-over";stText="Pasada de kcal"}
    else if(protOk){stClass="st-hit";stText="Objetivo cumplido"}
    else{stClass="st-under";stText="Falta proteína"}
  }
  $("status").className="dash-status "+stClass;$("status").textContent=stText;
  $("metrics").innerHTML=
    bigBar("Calorías",t.kcal,GOAL.kcal,'ceiling',"",'var(--blue)')+
    bigBar("Proteína",t.protein,GOAL.protein,'floor',"g",'var(--red)')+
    bigBar("Carbohidratos",t.carbs,GOAL.carbs,'window',"g",'var(--orange)')+
    bigBar("Grasa",t.fat,GOAL.fat,'ceiling',"g",'var(--purple)')+
    bigBar("Fibra",t.fiber,GOAL.fiber,'floor',"g",'var(--teal)');
}
function renderMeals(){
  const box=$("meals");
  if(state==="free"){box.innerHTML=`<div class="free-card"><div class="big">🌿</div><h2>Domingo libre</h2><p>Día de descanso del plan. Igual podés registrar lo que comas con el botón 💬 o el +.</p></div>`;return}
  box.innerHTML="";
  for(const meal of ["Comida","Snack","Cena"]){

    box.appendChild(card);
  }
}
function render(){renderDate();renderDash();renderMeals();persist(viewDate,state)}

/* ---------- ITEM INTERACTIONS ---------- */
document.body.addEventListener("click",e=>{

  if(tog){const[meal,id]=tog.dataset.toggle.split("|");const it=state[meal].find(x=>x.id===id);it.on=!it.on;render();return}
  const del=e.target.closest("[data-del]");
  if(del){const[meal,id]=del.dataset.del.split("|");state[meal]=state[meal].filter(x=>x.id!==id);render();return}
  const add=e.target.closest("[data-add]");
  if(add){openSheet(add.dataset.add);return}
});

    state=dayState(viewDate);render();

/* ---------- AI ---------- */
async function askClaude(messages,system){
  const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages,system,max_tokens:1000})});
  const data=await res.json();
  if(!data.content)throw new Error(data.error||"sin respuesta");
  return data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
}
function parseJSON(txt){const clean=txt.replace(/```json|```/g,"").trim();const s=clean.indexOf("{"),e=clean.lastIndexOf("}");return JSON.parse(clean.slice(s,e+1))}
const MACRO_SYS=`Eres un nutricionista que estima macros de alimentos comunes en España (productos de El Corte Inglés cuando aplique). Te dan la descripción de un alimento y una cantidad. Devuelve SOLO un objeto JSON, sin texto ni markdown, con esta forma exacta:
{"n":"nombre limpio con cantidad","kcal":número,"p":gramos proteína,"c":gramos carbos,"f":gramos grasa,"fib":gramos fibra}
Todos los valores numéricos enteros. Si no se indica cantidad, asume una porción razonable y reflejala en "n". No añadas explicación.`;

let activeMeal=null,sheetMode="ai";
function openSheet(meal){
  if(state==="free"){ // en día libre, creamos estructura para poder registrar
    state={Comida:[],Snack:[],Cena:[]};
  }
  activeMeal=meal;sheetMode="ai";
  $("sheetSub").textContent=meal+" · "+viewDate.getDate()+" "+MONTHS[viewDate.getMonth()];
  $("tabAI").classList.add("active");$("tabStaple").classList.remove("active");
  renderSheetBody();
  $("scrim").classList.add("show");$("sheet").classList.add("show");
}
function closeSheet(){$("scrim").classList.remove("show");$("sheet").classList.remove("show")}
$("scrim").onclick=closeSheet;
$("tabAI").onclick=()=>{sheetMode="ai";$("tabAI").classList.add("active");$("tabStaple").classList.remove("active");renderSheetBody()};
$("tabStaple").onclick=()=>{sheetMode="staple";$("tabStaple").classList.add("active");$("tabAI").classList.remove("active");renderSheetBody()};
function addItem(meal,obj){
  if(state==="free")state={Comida:[],Snack:[],Cena:[]};
  if(!state[meal])state[meal]=[];
  state[meal].push({...obj,on:true,id:meal+"_"+Math.random().toString(36).slice(2,7)});
  render();
}
function renderSheetBody(){
  const body=$("sheetBody");
  if(sheetMode==="staple"){
    body.innerHTML=`<input class="search" id="searchInp" placeholder="Buscar en mis básicos…"><div class="list-group" id="stapleList"></div>`;
    const list=$("stapleList");
    function draw(filter=""){
      list.innerHTML="";
      STAPLES.filter(s=>s.n.toLowerCase().includes(filter.toLowerCase())).forEach(s=>{
        const el=document.createElement("div");el.className="staple";
        el.innerHTML=`<div><div class="staple-name">${s.n}</div><div class="staple-macros">${s.kcal} kcal · P ${s.p} · C ${s.c} · G ${s.f} · Fib ${s.fib}</div></div><div class="staple-add">+</div>`;
        el.onclick=()=>{addItem(activeMeal,s);closeSheet()};
        list.appendChild(el);
      });
    }
    draw();$("searchInp").addEventListener("input",e=>draw(e.target.value));
  } else {
    body.innerHTML=`<div class="field"><label>¿Qué comiste?</label><input id="ai_q" placeholder="ej. dos huevos revueltos con medio aguacate"></div><button class="ai-btn" id="ai_go">Calcular macros</button><div id="ai_result"></div><div class="hint">Estimo calorías y macros. Después podés ajustarlos antes de guardar.</div>`;
    $("ai_go").onclick=runLookup;
    $("ai_q").addEventListener("keydown",e=>{if(e.key==="Enter")runLookup()});
  }
}
async function runLookup(){
  const q=$("ai_q").value.trim();if(!q)return;
  const btn=$("ai_go");btn.disabled=true;btn.innerHTML='<span class="spin"></span>Calculando…';
  try{
    const txt=await askClaude([{role:"user",content:`Alimento: ${q}`}],MACRO_SYS);
    const o=parseJSON(txt);
    $("ai_result").innerHTML=`<div class="ai-found"><div class="fn">${o.n}</div><div class="fm">${o.kcal} kcal · P ${o.p} · C ${o.c} · G ${o.f} · Fib ${o.fib}</div><div class="grid4" style="margin-top:13px"><div class="field"><label>kcal</label><input id="e_kcal" type="number" value="${o.kcal}"></div><div class="field"><label>Proteína</label><input id="e_p" type="number" value="${o.p}"></div><div class="field"><label>Carbos</label><input id="e_c" type="number" value="${o.c}"></div><div class="field"><label>Grasa</label><input id="e_f" type="number" value="${o.f}"></div></div><button class="save-btn" id="e_save">Añadir al ${activeMeal}</button></div>`;
    $("e_save").onclick=()=>{addItem(activeMeal,{n:o.n,kcal:+$("e_kcal").value||0,p:+$("e_p").value||0,c:+$("e_c").value||0,f:+$("e_f").value||0,fib:o.fib||0});closeSheet()};
  }catch(err){
    $("ai_result").innerHTML=`<div class="ai-found" style="background:rgba(255,59,48,.1)">No pude calcularlo. Probá describirlo de otra forma o usá "Mis básicos".</div>`;
  }finally{btn.disabled=false;btn.textContent="Calcular macros"}
}

/* ---------- CHAT ---------- */
let chatHistory=[];
function chatSys(){
  const t=totals();
  let menu="día libre";
  if(state!=="free")menu=["Comida","Snack","Cena"].map(m=>m+": "+state[m].map(i=>i.n+(i.on?" ✓":"")).join(", ")).join(" | ");
  const wd=viewDate.getDay();
  return `Eres el coach de nutrición de Mayte dentro de su app de tracking. Hablá en español neutro, cercano, conciso y directo. Objetivos diarios: ${GOAL.kcal} kcal, ${GOAL.protein}g proteína (mínimo), ${GOAL.fiber}g fibra. Plan: ayuno 16/8 (12:00-20:00), recomposición, enfoque anti-bloating y salud intestinal, sin rúcula ni lechuga (usa mezcla baby/brotes tiernos), fermentados bienvenidos en porción chica (chucrut, kimchi, kombucha). Día visto: ${DAY_FULL[wd]} ${viewDate.getDate()} de ${MONTHS[viewDate.getMonth()]}.
Lo ya REGISTRADO (marcado ✓) suma: ${t.kcal} kcal, ${t.protein}g proteína, ${t.carbs}g carbos, ${t.fat}g grasa, ${t.fiber}g fibra.
Menú guía de hoy (✓ = ya comido): ${menu}.
Si Mayte dice que comió algo, registralo. Para registrar, incluí al final un bloque EXACTO así:
[[LOG meal=Comida|Snack|Cena; n=nombre con cantidad; kcal=N; p=N; c=N; f=N; fib=N]]
Podés incluir varios bloques LOG si comió varias cosas. Elegí meal según la hora/contexto. El texto antes del bloque es tu respuesta normal; no menciones el formato del bloque. Si solo pregunta algo, respondé sin bloque LOG. Respuestas de 1-3 frases.`;
}
function pushBub(cls,txt){const b=document.createElement("div");b.className="bub "+cls;b.textContent=txt;$("chatLog").appendChild(b);$("chatLog").scrollTop=$("chatLog").scrollHeight;return b}
function applyLogs(text){
  const re=/\[\[LOG\s+([^\]]+)\]\]/g;let m,any=false;
  while((m=re.exec(text))){
    any=true;
    const parts=Object.fromEntries(m[1].split(";").map(s=>{const i=s.indexOf("=");return[s.slice(0,i).trim(),s.slice(i+1).trim()]}));
    const meal=["Comida","Snack","Cena"].includes(parts.meal)?parts.meal:"Snack";
    addItem(meal,{n:parts.n||"Alimento",kcal:+parts.kcal||0,p:+parts.p||0,c:+parts.c||0,f:+parts.f||0,fib:+parts.fib||0});
    pushBub("sys","✓ Registrado en "+meal+": "+(parts.n||"alimento"));
  }
  return any;
}
async function sendChat(text){
  if(!text.trim())return;
  pushBub("me",text);
  chatHistory.push({role:"user",content:text});
  $("chatInp").value="";$("chatSend").disabled=true;
  const thinking=pushBub("ai","…");
  try{
    const reply=await askClaude(chatHistory,chatSys());
    chatHistory.push({role:"assistant",content:reply});
    const visible=reply.replace(/\[\[LOG[^\]]+\]\]/g,"").trim();
    thinking.textContent=visible||"Listo.";
    applyLogs(reply);
  }catch(err){thinking.textContent="Uy, no me pude conectar. Probá de nuevo."}
  finally{$("chatSend").disabled=false;$("chatInp").focus()}
}
$("fab").onclick=()=>{
  $("chatScrim").classList.add("show");$("chat").classList.add("show");
  if(!chatHistory.length)pushBub("ai","¡Hola Mayte! Contame qué comiste y lo registro, o preguntame lo que quieras del plan de hoy.");
};
function closeChat(){$("chatScrim").classList.remove("show");$("chat").classList.remove("show")}
$("chatX").onclick=closeChat;$("chatScrim").onclick=closeChat;
$("chatSend").onclick=()=>sendChat($("chatInp").value);
$("chatInp").addEventListener("keydown",e=>{if(e.key==="Enter")sendChat($("chatInp").value)});
const CHIPS=["¿Cómo voy de proteína?","Comí un yogur griego","¿Puedo comer chocolate?","¿Qué me falta hoy?"];
$("chips").innerHTML=CHIPS.map(c=>`<button class="chip">${c}</button>`).join("");
$("chips").addEventListener("click",e=>{if(e.target.classList.contains("chip"))sendChat(e.target.textContent)});

/* ---------- TABS ---------- */
document.querySelector(".tabbar").addEventListener("click",e=>{
  const btn=e.target.closest("[data-view]");if(!btn)return;
  const v=btn.dataset.view;
  document.querySelectorAll(".tabbar button").forEach(b=>b.classList.toggle("active",b===btn));
  document.querySelectorAll(".view").forEach(el=>el.classList.toggle("active",el.id==="view-"+v));
  // el chat (fab) solo tiene sentido en menú, pero lo dejamos visible siempre
  if(v==="shop")renderShop();
  if(v==="notes")loadNotes();
});

/* ---------- SHOPPING ---------- */
const SHOP_KEY="mayte_shop_v1";
function loadShop(){try{return JSON.parse(localStorage.getItem(SHOP_KEY))||[]}catch(e){return []}}
function saveShop(arr){try{localStorage.setItem(SHOP_KEY,JSON.stringify(arr))}catch(e){}}
let shopList=loadShop(); // [{name, done, cat}]

// Clasificación simple por categoría para ordenar la lista
function catOf(name){
  const n=name.toLowerCase();
  if(/pollo|atún|atun|bonito|sardina|calamar|salmón|salmon|merluza|huevo|clara|pavo|whey|bacon/.test(n))return "Proteínas";
  if(/yogur|oikos|cottage|queso|kombucha|kimchi|chucrut/.test(n))return "Lácteos y fermentados";
  if(/brócoli|brocoli|judía|judia|guisante|espinaca|baby|brote|tomate|aguacate|maíz|maiz|remolacha|batata|boniato|zanahoria|pepino|piña|pina/.test(n))return "Verduras y frutas";
  if(/fresa|arándano|arandano|lino/.test(n))return "Verduras y frutas";
  if(/pan|tortilla|masa madre|arroz|garbanzo/.test(n))return "Panes y cereales";
  if(/aceite|teriyaki|gochujang|mostaza|tahini|sésamo|sesamo/.test(n))return "Despensa";
  return "Otros";
}
// extrae el ingrediente base quitando cantidades entre paréntesis y duplicados
function baseName(n){
  return n.replace(/\s*\([^)]*\)/g,"").replace(/x?\d+\s*latas?/gi,"").replace(/\s{2,}/g," ").trim();
}
function generateFromWeek(){
  const set=new Map();
  for(let wd=0;wd<=6;wd++){
    if(BASE[wd]==="free")continue;
    for(const meal of ["Comida","Snack","Cena"]){
      BASE[wd][meal].forEach(it=>{
        const b=baseName(it.n);
        if(b && !set.has(b.toLowerCase()))set.set(b.toLowerCase(),b);
      });
    }
  }
  const existing=new Set(shopList.map(s=>s.name.toLowerCase()));
  set.forEach(b=>{
    if(!existing.has(b.toLowerCase()))shopList.push({name:b,done:false,cat:catOf(b)});
  });
  saveShop(shopList);renderShop();
}
$("genShop").onclick=()=>{
  if(shopList.some(s=>!s.done)&&!confirm("Voy a sumar los ingredientes del menú de la semana a tu lista. ¿Seguimos?"))return;
  generateFromWeek();
};
$("shopAdd").onclick=()=>addShop();
$("shopInp").addEventListener("keydown",e=>{if(e.key==="Enter")addShop()});
function addShop(){
  const v=$("shopInp").value.trim();if(!v)return;
  shopList.push({name:v,done:false,cat:catOf(v)});
  $("shopInp").value="";saveShop(shopList);renderShop();
}
function renderShop(){
  const box=$("shopList");
  if(!shopList.length){box.innerHTML=`<div class="empty">Tu lista está vacía.<br>Generala desde el menú o agregá a mano.</div>`;return}
  // agrupar por categoría
  const cats={};
  shopList.forEach((s,i)=>{(cats[s.cat]=cats[s.cat]||[]).push({...s,i})});
  const order=["Proteínas","Lácteos y fermentados","Verduras y frutas","Panes y cereales","Despensa","Otros"];
  box.innerHTML="";
  order.filter(c=>cats[c]).forEach(c=>{
    const g=document.createElement("div");g.className="shop-group";
    let rows=`<div class="shop-cat">${c}</div>`;
    cats[c].forEach(s=>{
      rows+=`<div class="shop-item ${s.done?"done":""}" data-shop="${s.i}"><div class="shop-chk ${s.done?"on":""}"></div><div class="shop-name">${s.name}</div><button class="shop-del" data-shopdel="${s.i}">×</button></div>`;
    });
    g.innerHTML=rows;box.appendChild(g);
  });
}
$("shopList").addEventListener("click",e=>{
  const del=e.target.closest("[data-shopdel]");
  if(del){const i=+del.dataset.shopdel;shopList.splice(i,1);saveShop(shopList);renderShop();return}
  const it=e.target.closest("[data-shop]");
  if(it){const i=+it.dataset.shop;shopList[i].done=!shopList[i].done;saveShop(shopList);renderShop();return}
});

/* ---------- NOTES ---------- */
const NOTES_KEY="mayte_notes_v1";
function loadNotes(){try{$("notesArea").value=localStorage.getItem(NOTES_KEY)||""}catch(e){}}
let notesTimer=null;
$("notesArea").addEventListener("input",()=>{
  clearTimeout(notesTimer);
  notesTimer=setTimeout(()=>{
    try{localStorage.setItem(NOTES_KEY,$("notesArea").value)}catch(e){}
    const tag=$("savedTag");tag.classList.add("show");setTimeout(()=>tag.classList.remove("show"),1200);
  },400);
});

render();
</script>
